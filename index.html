<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<style>
  :root{
    /* Палитра снята с фирменного баннера */
    --navy-900:#0A1A33; --navy-800:#0E2547; --navy:#163461; --navy-700:#1E3F70;
    --gold:#C9A94C; --gold-2:#E0C572; --gold-soft:#F5ECD4; --ivory:#F2E7D6;
    --paper:#F5F2EA; --surface:#FFFFFF; --line:#E7E1D3;
    --ink:#1A2230; --muted:#5A6678; --ok:#2E7D5B; --err:#B23B3B;
    --serif:Georgia,"Times New Roman","PT Serif","Noto Serif",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  .app{display:flex;flex-direction:column;height:100vh;max-width:560px;margin:0 auto;background:var(--surface)}

  /* ===== Шапка ===== */
  .header{position:relative;padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 16px;
    background:radial-gradient(130% 150% at 28% 0%, #18356A 0%, #0E2547 46%, var(--navy-900) 100%)}
  .header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold) 16%,var(--gold-2) 50%,var(--gold) 84%,transparent)}
  .lockup{display:flex;align-items:center;gap:14px;justify-content:center;max-width:480px;margin:0 auto}
  .lockup .mark{flex:none;width:54px;height:54px}
  .wm{min-width:0;text-align:left}
  .wm .name{font-family:var(--serif);font-weight:700;color:var(--ivory);
    font-size:clamp(18px,5.6vw,26px);letter-spacing:.05em;line-height:1;white-space:nowrap}
  .wm .rule{height:1px;margin:7px 0 6px;background:linear-gradient(90deg,var(--gold),rgba(201,169,76,.12))}
  .wm .sub{color:#CBB97F;text-transform:uppercase;font-weight:600;
    font-size:clamp(8px,2.5vw,11px);letter-spacing:clamp(.03em,.55vw,.15em)}

  /* ===== Полоса доверия + контакты ===== */
  .strip{padding:10px 14px 8px;background:var(--surface);border-bottom:1px solid var(--line)}
  .creds{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;
    font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .creds .gd{width:3px;height:3px;border-radius:9px;background:var(--gold)}
  .crow{display:flex;gap:7px}
  .crow a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-height:40px;padding:8px 4px;
    border-radius:9px;border:1px solid var(--line);text-decoration:none;color:var(--navy);
    font-size:11.5px;font-weight:600;cursor:pointer;background:var(--surface)}
  .crow a:hover{border-color:var(--gold);background:#FCFAF4}
  .crow a svg{width:13px;height:13px;color:var(--gold)}
  .site{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 6px 1px;margin-top:5px;
    text-decoration:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
  .site svg{width:12px;height:12px;color:var(--gold)}

  /* ===== Чат ===== */
  .chat{flex:1;overflow-y:auto;padding:18px 16px;background:var(--paper)}
  .chat::-webkit-scrollbar{width:8px}
  .chat::-webkit-scrollbar-thumb{background:#d8d3c6;border-radius:8px}
  .row{display:flex;margin-bottom:10px;animation:fadein .25s ease both}
  .row.user{justify-content:flex-end}
  .bubble{max-width:85%;padding:11px 14px;border-radius:15px;font-size:14.5px;line-height:1.5}
  .bubble.bot{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bubble.user{background:var(--navy);color:#fff;border-bottom-right-radius:5px}
  .wide{max-width:94%;width:94%}
  .typing{display:inline-flex;gap:5px;padding:12px 14px;border-radius:15px;background:var(--surface);border:1px solid var(--line)}
  .dot{width:7px;height:7px;border-radius:99px;background:var(--gold);opacity:.55;animation:blink 1.2s infinite both}

  /* ===== Карточка (оценка / расчёт / чек-лист) ===== */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;border-top-left-radius:5px;padding:16px;
    box-shadow:0 1px 2px rgba(15,38,71,.04)}
  .card .hd{display:flex;align-items:center;gap:9px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .card .seal{width:30px;height:30px;flex:none}
  .card .ti{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--navy)}
  .card .tag{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--navy);background:var(--gold-soft);padding:3px 8px;border-radius:6px;border:1px solid #C9A94C40}
  .card p{margin:13px 0 0;font-size:14px;line-height:1.55}
  .bignum{font-family:var(--serif);font-size:25px;font-weight:700;color:var(--navy);line-height:1.15;margin-top:2px}
  .sect{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:15px 0 8px}
  .norm{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:8px}
  .nchip{font-family:var(--mono);font-size:12px;font-weight:600;color:#9A7B22;background:var(--gold-soft);
    border:1px solid #C9A94C50;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .nnote{font-size:13px;color:var(--muted);line-height:1.45;flex:1;min-width:160px}
  .li{display:flex;gap:9px;margin-bottom:6px;font-size:13.5px;line-height:1.45}
  .li svg{width:15px;height:15px;flex-shrink:0;margin-top:2px}
  .disc{margin-top:15px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.45}

  /* ===== Карточка заявки ===== */
  .leadcard{position:relative;background:linear-gradient(150% 150% at 80% 0%,var(--navy) 0%,var(--navy-800) 100%);

  .leadcard .stamp{position:absolute;top:12px;right:12px;width:40px;height:40px;opacity:.9}
  .leadcard .hd{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .leadcard .ck{width:25px;height:25px;border-radius:99px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex:none}
  .leadcard .ck svg{width:15px;height:15px;color:var(--navy-900)}
  .leadcard .hd .ti{font-family:var(--serif);font-weight:700;font-size:15px}
  .fld{display:flex;gap:10px;font-size:13px;padding:3px 0}
  .fld .k{color:#9FB0C4;min-width:96px}.fld .v{font-weight:500}
  .deliv{margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.14)}
  .srow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0}
  .srow .lbl{color:#CDD6E0;min-width:64px}
  .srow .tgt{color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow .st{font-weight:600;white-space:nowrap}
  .fbk{display:flex;gap:8px;margin-top:8px}
  .fbk a{flex:1;text-align:center;padding:9px;border-radius:9px;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-size:12.5px;font-weight:600;cursor:pointer}

  /* ===== Управление ===== */
  .controls{border-top:1px solid var(--line);background:var(--surface);padding:12px;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px)}
  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .cat{display:flex;align-items:center;gap:9px;flex:1 1 calc(50% - 8px);min-width:150px;min-height:46px;
    padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--surface);cursor:pointer;
    text-align:left;color:var(--navy);font-size:13px;font-weight:500}
  .cat:hover{border-color:var(--gold);background:#FCFAF4}
  .cat svg{width:16px;height:16px;color:var(--gold);flex-shrink:0}
  .form{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
  .fl{display:flex;flex-direction:column;gap:4px}
  .fl label{font-size:12px;font-weight:600;color:var(--muted)}
  .fl select,.fl input{padding:11px;border-radius:10px;border:1px solid var(--line);font-size:14px;
    font-family:inherit;color:var(--ink);background:#fff;outline:none;width:100%;min-height:44px}
  .fl select:focus,.fl input:focus{border-color:var(--gold)}
  .calc-actions{display:flex;gap:8px}
  .quick{display:flex;gap:8px;margin-bottom:12px}
  .qbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-height:46px;padding:11px 8px;
    border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid}
  .qbtn svg{width:16px;height:16px;flex-shrink:0}
  .qbook{background:var(--navy);color:#fff;border-color:var(--navy)}
  .qbook svg{color:var(--gold-2)}
  .qbook:hover{background:var(--navy-700)}
  .qcalc{background:var(--gold-soft);color:var(--navy);border-color:#C9A94C70}
  .qcalc svg{color:#9A7B22}
  .qcalc:hover{background:#F1E5C9}
  .btns{display:flex;gap:8px}
  .cta{flex:1;min-height:46px;padding:12px;border-radius:12px;border:none;background:var(--navy);color:#fff;
    font-weight:600;font-size:14px;cursor:pointer}
  .cta:hover{background:var(--navy-700)}
  .cta2{min-height:46px;padding:12px 16px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    color:var(--navy);font-weight:600;font-size:14px;cursor:pointer}
  .cta2:hover{border-color:var(--gold)}
  .full{width:100%}
  .inrow{display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;max-height:120px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
    font-size:14px;font-family:inherit;color:var(--ink);outline:none;line-height:1.4}
  textarea:focus{border-color:var(--gold)}
  textarea:disabled{background:var(--paper)}
  .send{width:46px;height:46px;border-radius:12px;border:none;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .send:hover{background:var(--navy-700)}
  .send:disabled{background:#C7CCD8;cursor:default}
  .send svg{width:18px;height:18px}

  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:.9}}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.row,.dot{animation:none}}
</style>
</head>

<script>

function el(tag, attrs, ...kids){
  const e=document.createElement(tag); attrs=attrs||{};
  for(const k in attrs){
    if(k==="style") Object.assign(e.style,attrs[k]);
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  for(const kid of kids){ if(kid==null) continue; e.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return e;
}

/* ===================== Фирменная монограмма «ВТ» ===================== */
/* HEX-значения заданы напрямую (а не CSS-переменными) — чтобы знак корректно
   отрисовывался в вебвью Telegram на iOS, где var() в атрибутах SVG не работает. */
let _mgId=0;
function monogram(opts){
  opts=opts||{};
  const solid = opts.fill !== "none";
  const fill = solid ? (opts.fill || "#163461") : "none";  // заливка круга
  const ring = opts.ring || "#C9A94C";                     // золотое кольцо
  const letters = opts.letters || "#F2E7D6";               // буквы ВТ
  const gid = "mg"+(++_mgId);
  const circleFill = solid ? `url(#${gid})` : "none";
  const defs = solid ? `<defs><radialGradient id="${gid}" cx="34%" cy="26%" r="80%">
      <stop offset="0%" stop-color="#23487F"/><stop offset="58%" stop-color="${fill}"/>
      <stop offset="100%" stop-color="${fill}"/></radialGradient></defs>` : "";
  const s=`<svg viewBox="0 0 64 64" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Валерий Тропин">
    ${defs}
    <circle cx="32" cy="32" r="30" fill="${circleFill}"/>
    <circle cx="32" cy="32" r="27.4" fill="none" stroke="${ring}" stroke-width="1.7"/>
    <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="27" letter-spacing="-1"
      fill="${letters}">ВТ</text>
  </svg>`;
  const wrap=el("span"); wrap.style.display="block"; wrap.style.width="100%"; wrap.style.height="100%"; wrap.innerHTML=s;
  return wrap.firstChild;
}

function normalize(p){
  const arr=v=>Array.isArray(v)?v.filter(Boolean):[];
  return {
    summary: typeof p.summary==="string"?p.summary:"",
    norms: arr(p.norms).map(n=> typeof n==="string"?{ref:"",note:n}:{ref:n.ref||"",note:n.note||""}),
    actions: arr(p.actions).map(String),
    documents: arr(p.documents).map(String),
    note: typeof p.note==="string"?p.note:"",
  };
}
async function getAssessment(category, description){
  try{
    const res=await fetch("/api/assess",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({category,description})});
    if(!res.ok) return {ok:false};
    const data=await res.json();
    const text=(data.text||"").trim();
    const clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
    try{ return {ok:true,data:normalize(JSON.parse(clean))}; }
    catch{ return {ok:true,data:{summary:text,norms:[],actions:[],documents:[],note:""}}; }
  }catch{ return {ok:false}; }
}
async function runAssessment(label, description){
  setControls("assessing");
  const t=addTyping();
  const r=await getAssessment(label,description);
  t.remove();
  if(!r.ok){
    botText("Сформировать предварительную оценку сейчас не получилось. Оставьте контакт — Валерий разберёт вашу ситуацию лично.");
    setControls("postAssess"); return;
  }
  pending.category=label; pending.description=description; pending.assessment=r.data;
  assessmentCard(r.data);
  haptic("success");
  botText("Нужен детальный разбор по вашим документам? Оставьте контакт — Валерий свяжется с вами.");
  setControls("postAssess");
}

/* Госпошлина: суды общей юрисдикции (ст. 333.19 НК РФ, ред. с 09.2024) */
function gpImushch(x){
  if(x<=100000) return 4000;
  if(x<=300000) return 4000 + 0.03*(x-100000);
  if(x<=500000) return 10000 + 0.025*(x-300000);
  if(x<=1000000) return 15000 + 0.02*(x-500000);
  if(x<=3000000) return 25000 + 0.01*(x-1000000);
  if(x<=8000000) return 45000 + 0.007*(x-3000000);
  if(x<=24000000) return 80000 + 0.0035*(x-8000000);
  if(x<=50000000) return 136000 + 0.003*(x-24000000);
  if(x<=100000000) return 214000 + 0.002*(x-50000000);
  return Math.min(314000 + 0.0015*(x-100000000), 900000);
}
function gpSoyFormula(x){
  if(x<=100000) return "Фиксированно: 4 000 ₽";
  if(x<=300000) return "4 000 ₽ + 3% от суммы свыше 100 000 ₽";
  if(x<=500000) return "10 000 ₽ + 2,5% от суммы свыше 300 000 ₽";
  if(x<=1000000) return "15 000 ₽ + 2% от суммы свыше 500 000 ₽";
  if(x<=3000000) return "25 000 ₽ + 1% от суммы свыше 1 000 000 ₽";
  if(x<=8000000) return "45 000 ₽ + 0,7% от суммы свыше 3 000 000 ₽";
  if(x<=24000000) return "80 000 ₽ + 0,35% от суммы свыше 8 000 000 ₽";
  if(x<=50000000) return "136 000 ₽ + 0,3% от суммы свыше 24 000 000 ₽";
  if(x<=100000000) return "214 000 ₽ + 0,2% от суммы свыше 50 000 000 ₽";
  return "314 000 ₽ + 0,15% свыше 100 000 000 ₽ (не более 900 000 ₽)";
}
function computeGosp(){
  const type=val("gp-type");
  let gp=0, line="", extra="";
  if(type==="imushch"||type==="prikaz"){
    const x=num("gp-sum");
    if(!x||x<=0){ botText("Укажите цену иска числом больше нуля."); return; }
    const base=gpImushch(x);
    gp = type==="prikaz" ? Math.round(base*0.5) : Math.round(base);
    line = (type==="prikaz"?"Судебный приказ":"Имущественный иск")+", цена иска "+fmt(x);
    extra = (type==="prikaz"?"50% от госпошлины по иску · ":"")+gpSoyFormula(x);
  } else if(type==="neimushch"){
    const who=val("gp-istec");
    gp = who==="org"?20000:3000;
    line = "Неимущественный иск, "+(who==="org"?"организация":"физлицо");
    extra = "Фиксированная ставка";
  } else { gp=5000; line="Расторжение брака"; extra="Фиксированная ставка"; }
  pending.description = line+" → госпошлина ≈ "+fmt(gp);
  calcCard("Госпошлина — расчёт", line, "≈ "+fmt(gp), "ст. 333.19 НК РФ",
    "Ориентировочно, для судов общей юрисдикции и мировых судей. Сумма округлена до рубля. Возможны льготы (ст. 333.36 НК РФ); по искам о взыскании алиментов истец госпошлину не платит. Для арбитражных судов ставки иные (ст. 333.21 НК РФ).", extra);
}

/* Алименты (ст. 81 СК РФ) */
function computeAlim(){
  const income=num("al-income");
  if(!income||income<=0){ botText("Укажите доход числом больше нуля."); return; }
  const k=val("al-kids");
  const share = k==="1"?0.25 : k==="2"?(1/3) : 0.5;
  const pct = k==="1"?"1/4 (25%)" : k==="2"?"1/3 (≈33%)" : "1/2 (50%)";
  const amount=Math.round(income*share);
  pending.description = "Алименты: доход "+fmt(income)+", "+(k==="3"?"3 и более детей":(k+" реб."))+" → "+pct+" ≈ "+fmt(amount)+"/мес";
  calcCard("Алименты — расчёт", "Доля от дохода: "+pct, "≈ "+fmt(amount)+" / мес", "ст. 81 СК РФ",
    "Ориентировочно. Доля удерживается из дохода после налогов. Суд может изменить размер с учётом обстоятельств (ст. 81 СК РФ) или назначить выплату в твёрдой сумме (ст. 83 СК РФ). Если дети от разных родителей — расчёт иной.");
}

/* Госпошлина: арбитраж (ст. 333.21 НК РФ, ред. с 09.2024) */
function gpArb(x){
  if(x<=100000) return 10000;
  if(x<=1000000) return 10000 + 0.05*(x-100000);
  if(x<=10000000) return 55000 + 0.03*(x-1000000);
  if(x<=50000000) return 325000 + 0.01*(x-10000000);
  return Math.min(725000 + 0.005*(x-50000000), 10000000);
}
function gpArbFormula(x){
  if(x<=100000) return "Фиксированно: 10 000 ₽";
  if(x<=1000000) return "10 000 ₽ + 5% от суммы свыше 100 000 ₽";
  if(x<=10000000) return "55 000 ₽ + 3% от суммы свыше 1 000 000 ₽";
  if(x<=50000000) return "325 000 ₽ + 1% от суммы свыше 10 000 000 ₽";
  return "725 000 ₽ + 0,5% свыше 50 000 000 ₽ (не более 10 000 000 ₽)";
}
function computeArb(){
  const type=val("ab-type");
  let gp=0, line="", extra="";
  if(type==="imushch"||type==="prikaz"){
    const x=num("ab-sum");
    if(!x||x<=0){ botText("Укажите цену иска числом больше нуля."); return; }
    const base=gpArb(x);
    gp = type==="prikaz" ? Math.max(Math.round(base*0.5),8000) : Math.round(base);
    line = (type==="prikaz"?"Судебный приказ":"Имущественный иск")+" (арбитраж), цена иска "+fmt(x);
    extra = (type==="prikaz"?"50% от госпошлины по иску, но не менее 8 000 ₽ · ":"")+gpArbFormula(x);
  } else {
    const who=val("ab-istec");
    gp = who==="org"?50000:15000;
    line = "Неимущественный иск (арбитраж), "+(who==="org"?"организация":"физлицо/ИП");
    extra = "Фиксированная ставка";
  }
  pending.description = line+" → госпошлина ≈ "+fmt(gp);
  calcCard("Госпошлина в арбитраж — расчёт", line, "≈ "+fmt(gp), "ст. 333.21 НК РФ",
    "Ориентировочно, для арбитражных судов. Сумма округлена до рубля. По судебному приказу — не менее 8 000 ₽. При подаче должником заявления о собственном банкротстве госпошлина не взимается.", extra);
}

/* Неустойка / пени (договорная, ст. 330 ГК РФ) */
function computePeni(){
  const sum=num("pn-sum");
  if(!sum||sum<=0){ botText("Укажите сумму долга числом больше нуля."); return; }
  const rate=parseFloat((val("pn-rate")||"").replace(",","."));
  if(!rate||rate<=0){ botText("Укажите ставку неустойки, например 0,1 % в день."); return; }
  const type=val("pn-rate-type");
  const from=val("pn-from"), to=val("pn-to");
  if(!from||!to){ botText("Укажите период просрочки: дату начала и дату окончания."); return; }
  const d0=new Date(from), d1=new Date(to);
  let days=Math.round((d1-d0)/86400000);
  if(isNaN(days)||days<0){ botText("Дата окончания должна быть позже даты начала."); return; }
  if(days===0) days=1;
  const perDay = type==="year" ? rate/365 : rate;
  const amount = sum * (perDay/100) * days;
  const rateLabel = type==="year" ? (rate.toLocaleString("ru-RU")+"% годовых") : (rate.toLocaleString("ru-RU")+"% в день");
  const perDayStr = perDay.toLocaleString("ru-RU",{maximumFractionDigits:4});
  pending.description = "Неустойка: долг "+fmt(sum)+", ставка "+rateLabel+", период "+from+"…"+to+" ("+days+" дн.) → ≈ "+fmt(amount);
  calcCard("Неустойка — расчёт", "Долг "+fmt(sum)+" · "+rateLabel+" · "+days+" дн.", "≈ "+fmt(amount), "ст. 330 ГК РФ",
    "Договорная неустойка: сумма × ставка × число дней просрочки. Это ориентир. Суд вправе уменьшить явно несоразмерную неустойку (ст. 333 ГК РФ). Законные проценты по ст. 395 ГК РФ считаются по ключевой ставке Банка России отдельно за каждый её период — это сделает юрист по актуальным данным.",
    "Формула: "+fmt(sum)+" × "+perDayStr+"%/дн × "+days+" дн.");
}

/* Банкротство — экспресс-проверка */
function computeBankr(){
  const debt=num("bk-debt");
  if(!debt||debt<=0){ botText("Укажите сумму долга числом больше нуля."); return; }
  const overdue=val("bk-overdue")==="yes";
  const ip=val("bk-ip");
  const priv=val("bk-priv")==="yes";
  const mfcRange = debt>=25000 && debt<=1000000;
  let route, detail, ref;
  if(mfcRange && (ip==="closed" || priv)){
    route="Внесудебное (через МФЦ), бесплатно";
    detail=(priv && ip!=="closed")
      ? "Вы в льготной категории (пенсионер, пособия на детей или участник СВО) — внесудебное банкротство доступно даже при открытом исполнительном производстве, при соблюдении сроков."
      : "Долг в пределах 25 000–1 000 000 ₽, исполнительное производство закрыто из-за отсутствия имущества — это основной путь для МФЦ. Процедура бесплатная и длится около 6 месяцев.";
    ref="ст. 223.2 ФЗ «О банкротстве»";
  } else if(debt>=500000 && debt<=1000000){
    route="Судебное (арбитражный суд)";
    detail="При долге от 500 000 ₽ и просрочке свыше 3 месяцев гражданин обязан подать заявление. Процедура платная (финансовый управляющий и расходы), но списывает почти любые долги."+(overdue?"":" Уточните срок просрочки.");
    ref="ст. 213.4 ФЗ «О банкротстве»";
  } else if(debt>1000000){
    route="Судебное (арбитражный суд)";
    detail="Долг свыше 1 000 000 ₽ — бесплатный путь через МФЦ недоступен, банкротство проходит через суд.";
    ref="ст. 213.4 ФЗ «О банкротстве»";
  } else if(mfcRange){
    route="Судебное или дождаться закрытия ИП";
    detail="Сумма подходит для МФЦ, но для бесплатного пути нужно закрытое исполнительное производство «нет имущества» либо льготный статус. Иначе остаётся судебный путь.";
    ref="ст. 223.2 / 213.4 ФЗ «О банкротстве»";
  } else {
    route="Банкротство, скорее всего, не требуется";
    detail="Долг меньше 25 000 ₽ — для внесудебного банкротства недостаточно, а судебное при такой сумме обычно нецелесообразно. Возможны другие решения: переговоры с кредиторами, реструктуризация.";
    ref="ст. 223.2 ФЗ «О банкротстве»";
  }
  pending.description="Банкротство: долг "+fmt(debt)+", просрочка 3+ мес: "+(overdue?"да":"нет")+", ИП: "+(ip==="closed"?"закрыто":ip==="open"?"открыто":"не знаю")+", льгота: "+(priv?"да":"нет")+" → "+route;
  calcCard("Банкротство — предварительная проверка", "Вероятный вариант:", route, ref,
    detail+" Это ориентир, а не юридическое заключение: итог зависит от состава долгов, имущества и сделок за последние 3 года. Перед подачей стоит проконсультироваться с юристом.");
}

    form.append(el("div",{class:"fl"}, el("label",{},"Сумма долга, ₽"), el("input",{type:"number",id:"pn-sum",inputmode:"numeric",placeholder:"Например, 500000"})));
    const rt=el("select",{id:"pn-rate-type"}, el("option",{value:"day"},"% в день"), el("option",{value:"year"},"% годовых"));
    form.append(
      el("div",{class:"fl"}, el("label",{},"Ставка неустойки"), el("input",{type:"number",id:"pn-rate",inputmode:"decimal",step:"0.01",placeholder:"Например, 0,1"})),
      el("div",{class:"fl"}, el("label",{},"Тип ставки"), rt));
    const today=new Date().toISOString().slice(0,10);
    form.append(
      el("div",{class:"fl"}, el("label",{},"Просрочка с"), el("input",{type:"date",id:"pn-from"})),
      el("div",{class:"fl"}, el("label",{},"по"), el("input",{type:"date",id:"pn-to",value:today})));
    const go=el("button",{class:"cta full",onclick:computePeni},"Рассчитать");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:leaveContact},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="calcAlim"){
    const form=el("div",{class:"form"});
    form.append(el("div",{class:"fl"}, el("label",{},"Ежемесячный доход плательщика (после налогов), ₽"), el("input",{type:"number",id:"al-income",inputmode:"numeric",placeholder:"Например, 80000"})));
    const kids=el("select",{id:"al-kids"}, el("option",{value:"1"},"1 ребёнок"), el("option",{value:"2"},"2 детей"), el("option",{value:"3"},"3 и более"));
    form.append(el("div",{class:"fl"}, el("label",{},"Количество детей"), kids));
    const go=el("button",{class:"cta full",onclick:computeAlim},"Рассчитать");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:leaveContact},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="calcBankr"){
    const form=el("div",{class:"form"});
    form.append(el("div",{class:"fl"}, el("label",{},"Общая сумма долгов, ₽"), el("input",{type:"number",id:"bk-debt",inputmode:"numeric",placeholder:"Например, 600000"})));
    const ov=el("select",{id:"bk-overdue"}, el("option",{value:"yes"},"Да, больше 3 месяцев"), el("option",{value:"no"},"Нет или меньше"));
    form.append(el("div",{class:"fl"}, el("label",{},"Просрочка по платежам"), ov));
    const ipsel=el("select",{id:"bk-ip"}, el("option",{value:"closed"},"Закрыто приставами «нет имущества»"), el("option",{value:"open"},"Открыто / идёт"), el("option",{value:"unknown"},"Не знаю"));
    form.append(el("div",{class:"fl"}, el("label",{},"Исполнительное производство у приставов"), ipsel));
    const pr=el("select",{id:"bk-priv"}, el("option",{value:"no"},"Нет"), el("option",{value:"yes"},"Пенсионер / пособия на детей / СВО"));
    form.append(el("div",{class:"fl"}, el("label",{},"Особый статус"), pr));
    const go=el("button",{class:"cta full",onclick:computeBankr},"Проверить");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:leaveContact},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="intake"){
    controls.append(inputRow("Опишите детали…","",true));
  }else if(s==="assessing"){
    controls.append(inputRow("Подождите…","",false));
  }else if(s==="postAssess"){
    const wrap=el("div",{class:"btns"});
    wrap.append(el("button",{class:"cta",onclick:leaveContact},"Оставить контакт"),
                el("button",{class:"cta2",onclick:()=>{ haptic(); botText("Опишите вопрос или уточните детали — обновлю оценку."); setControls("intake"); }},"Ещё вопрос"));
    controls.append(wrap);
  }else if(s==="postChecklist"){
    const wrap=el("div",{class:"btns"});
    wrap.append(el("button",{class:"cta",onclick:leaveContact},"Оставить контакт"),
                el("button",{class:"cta2",onclick:()=>setControls("subs")},"К разделу"));
    controls.append(wrap);
  }else if(s==="bookTime"){
    controls.append(inputRow("Желаемые день и время (например: завтра после 18:00)","",true));
  }else if(s==="bookTopic"){
    controls.append(inputRow("Тема вопроса (или «—»)","",true));
  }else if(s==="contactName"){
    controls.append(inputRow("Ваше имя", TGUSER.name, true));
  }else if(s==="contactInfo"){
    controls.append(inputRow("Телефон, Telegram или email", TGUSER.username, true));
  }else if(s==="done"){
    controls.append(el("button",{class:"cta2 full",onclick:reset},"Новый диалог"));
  }
}

/* ===================== Старт ===================== */
function greet(){
  const hi = TGUSER.first ? ("Здравствуйте, "+TGUSER.first+"! ") : "Здравствуйте! ";
  botText(hi+"Я — помощник Валерия Тропина, юриста для бизнеса с 25-летней практикой. Опишите ситуацию или выберите раздел: дам предварительную оценку и передам обращение Валерию.");
}
greet();
setControls("greeting");
</script>
